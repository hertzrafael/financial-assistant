services:
  backend:
    container_name: financial-backend
    image: ghcr.io/hertzrafael/financial-assistant:main
    restart: always
    ports:
      - "8080:8000"
    environment:
      - OPENAI_API_KEY=your_key_here
      - EVOLUTION_BASE_URL=http://financial-evolution-api:8080
      - EVOLUTION_API_KEY=x0bJ8CyuM7sk6bD1
      - EVOLUTION_INSTANCE_ID=financial-agent
      - EVOLUTION_WEBHOOK_URL=http://financial-backend:8000/api/v1/webhook
      - DATABASE_DSN=postgresql+asyncpg://postgres:postgres@postgres:5432/financial
      - CHECKPOINTER_DSN=postgresql://postgres:postgres@postgres:5432/financial
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      - postgres
      - redis
  postgres:
    image: postgres:16
    container_name: financial-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=financial
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:latest
    container_name: financial-redis
    command: >
      redis-server --port 6379 --appendonly yes
    volumes:
      - evolution_redis:/data
    ports:
      - 6379:6379
  evolution-api:
    container_name: financial-evolution-api
    image: evoapicloud/evolution-api:latest
    restart: always
    ports:
      - "8081:8080"
    environment:
      - AUTHENTICATION_API_KEY=x0bJ8CyuM7sk6bD1
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:postgres@postgres:5432/financial
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      - DATABASE_SAVE_DATA_LABELS=true
      - DATABASE_SAVE_DATA_HISTORIC=true
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_v2
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://financial-redis:6379/1
      - CACHE_REDIS_PREFIX_KEY=evolution_v2
      - CACHE_REDIS_SAVE_INSTANCES=false
      - CACHE_LOCAL_ENABLED=false
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      - postgres

volumes:
  postgres_data:
  evolution_redis:
  evolution_instances: